apiVersion: v1
kind: ConfigMap
metadata:
  name: the925-config
data:
  DB_MASTER_URL: jdbc:mysql://mysql-primary:3306/moviedb?autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false&cachePrepStmts=true
  DB_SLAVE_URL: jdbc:mysql://mysql-secondary:3306/moviedb?autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false&cachePrepStmts=true
---
apiVersion: v1
kind: Secret
metadata:
  name: the925-secrets
type: Opaque
stringData:
  DB_MASTER_USER: replace-with-db-master-user
  DB_MASTER_PASSWORD: replace-with-db-master-password
  DB_SLAVE_USER: replace-with-db-slave-user
  DB_SLAVE_PASSWORD: replace-with-db-slave-password
  JWT_SECRET_BASE64: replace-with-base64-hs256-secret
  RECAPTCHA_SECRET_KEY: replace-with-recaptcha-secret
  RECAPTCHA_SITE_KEY: replace-with-recaptcha-site-key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: the925  # Updated name
spec:
  replicas: 2
  selector:
    matchLabels:
      app: the925  # Updated label
  template:
    metadata:
      labels:
        app: the925  # Updated label
    spec:
      containers:
        - name: the925-container  # Updated container name
          image: makimball/cs122b-p5-the925:latest  # Updated image
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: the925-config
            - secretRef:
                name: the925-secrets
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: the925-service  # Updated service name
spec:
  selector:
    app: the925  # Updated label
  ports:
    - name: http
      port: 8080
  type: ClusterIP