apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: the925-ingress-multi
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"             # Enables regex matching for paths
    nginx.ingress.kubernetes.io/affinity: "cookie"            # Enables session affinity (sticky sessions)
    nginx.ingress.kubernetes.io/session-cookie-name: "stickounet" # Name of the session cookie
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"  # Expires in 2 days
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"  # Max age for the cookie (2 days)
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Route for login API calls
          - path: /cs122b-project5-the925/api/login
            pathType: Prefix
            backend:
              service:
                name: the925-login-service
                port:
                  number: 8080

          # Regex-style route for login
          - path: /cs122b-project5-the925/login.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: the925-login-service
                port:
                  number: 8080

          # Catch-all route for everything else
          - path: /
            pathType: Prefix
            backend:
              service:
                name: the925-movies-service
                port:
                  number: 8080
