apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: the925-ingress-multi
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "stickounet"
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
    # This is the key rewrite annotation:
    nginx.ingress.kubernetes.io/rewrite-target: /The925/api/$1
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Rewrite anything under /api/... to /The925/api/...
          - path: /api/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: the925-login-service
                port:
                  number: 8080

          # Catch-all for everything else
          - path: /
            pathType: Prefix
            backend:
              service:
                name: the925-movies-service
                port:
                  number: 8080
