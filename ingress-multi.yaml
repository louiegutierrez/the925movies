apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: the925-ingress-multi
  namespace: default
  annotations:
    # You can keep or remove use-regex depending on whether you need regex paths
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "stickounet"
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # 1) /api/login -> your POST login endpoint
          - path: /api/login
            pathType: Prefix
            backend:
              service:
                name: the925-login-service
                port:
                  number: 8080

          # 2) Exact path for your static login page
          - path: /login.html
            pathType: Exact
            backend:
              service:
                name: the925-login-service
                port:
                  number: 8080

          # 3) Everything else -> movies service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: the925-movies-service
                port:
                  number: 8080