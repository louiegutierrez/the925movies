apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: the925-ingress-multi
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "stickounet"
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Route for login API calls
          - path: /The925/api/login
            pathType: Prefix
            backend:
              service:
                name: the925-login-service
                port:
                  number: 8080

          # Regex-style route for anything under /The925/login...
          - path: /The925/login.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: the925-login-service
                port:
                  number: 8080

          # Catch-all route for everything else
          - path: /
            pathType: Prefix
            backend:
              service:
                name: the925-movies-service
                port:
                  number: 8080
