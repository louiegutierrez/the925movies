        - name: the925-login-container
          image: makimball/cs122b-p5-the925-login:v1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: the925-config
            - secretRef:
                name: the925-secrets
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: the925-login-service
spec:
  selector:
