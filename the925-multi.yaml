# the925-movies
apiVersion: v1
kind: ConfigMap
metadata:
  name: the925-config
data:
  DB_MASTER_URL: jdbc:mysql://mysql-primary:3306/moviedb?autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false&cachePrepStmts=true
  DB_SLAVE_URL: jdbc:mysql://mysql-secondary:3306/moviedb?autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false&cachePrepStmts=true
---
apiVersion: v1
kind: Secret
metadata:
  name: the925-secrets
type: Opaque
stringData:
  DB_MASTER_USER: replace-with-db-master-user
  DB_MASTER_PASSWORD: replace-with-db-master-password
  DB_SLAVE_USER: replace-with-db-slave-user
  DB_SLAVE_PASSWORD: replace-with-db-slave-password
  JWT_SECRET_BASE64: replace-with-base64-hs256-secret
  RECAPTCHA_SECRET_KEY: replace-with-recaptcha-secret
  RECAPTCHA_SITE_KEY: replace-with-recaptcha-site-key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: the925-movies
spec:
  replicas: 2
  selector:
    matchLabels:
      app: the925-movies
  template:
    metadata:
      labels:
        app: the925-movies
    spec:
      containers:
        - name: the925-movies-container
          image: makimball/cs122b-p5-the925-movies:v1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: the925-config
            - secretRef:
                name: the925-secrets
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: the925-movies-service
spec:
  selector:
    app: the925-movies
  ports:
    - name: http
      port: 8080
  type: ClusterIP

# the925-login
