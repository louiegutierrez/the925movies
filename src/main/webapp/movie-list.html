<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1. shrink-to-fit=no">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/movie-list.css">
    <link rel="stylesheet" href="styles/nav-bar.css">

    <title>Movie List</title>
</head>
<body>
<header>
    <nav class="navbar">
        <ul>
            <li><a href="index.html">Browse</a></li>
            <li><a href="movie-list.html" class="active">Movie List</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>
        <form id="searchForm" action="movie-list.html" method="GET">
            <input type="text" name="title" placeholder="Title">
            <input type="number" name="year" placeholder="Year">
            <input type="text" name="director" placeholder="Director">
            <input type="text" name="star" placeholder="Star's Name">
            <button type="submit">Search</button>
        </form>
    </nav>
</header>

<h1 id="title"> Movies List </h1>

<table id=movie_table class="table table-striped">
    <thead>
    <tr>
        <th>Title</th>
        <th>Year</th>
        <th>Directed By</th>
        <th>Genres</th>
        <th>Stars</th>
        <th>Rating</th>
    </tr>
    </thead>
    <tbody id=movie_table_body></tbody>
</table>
<div id="na"> </div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

</body>
</html>
