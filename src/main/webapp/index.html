<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/nav-bar.css">

    <title>Movie List</title>
</head>
<body>
<header>
    <nav class="navbar">
        <ul>
            <li><a href="index.html" class="active">Browse</a></li>
            <li><a href="movie-list.html">Movie List</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>
        <form id="searchForm" action="movie-list.html" method="GET">
            <input type="text" name="title" placeholder="Title">
            <input type="number" name="year" placeholder="Year">
            <input type="text" name="director" placeholder="Director">
            <input type="text" name="star" placeholder="Star's Name">
            <button type="submit">Search</button>
        </form>
    </nav>
</header>

<main>
    <div class="container">
        <h1>Browse by Genres</h1>
        <div class="genres">

        </div>

        <h1>Browse by Letters</h1>
        <div class="letters">
            <a href="#" data-letter="0">0</a>
            <a href="#" data-letter="1">1</a>
            <a href="#" data-letter="2">2</a>
            <a href="#" data-letter="3">3</a>
            <a href="#" data-letter="4">4</a>
            <a href="#" data-letter="5">5</a>
            <a href="#" data-letter="6">6</a>
            <a href="#" data-letter="7">7</a>
            <a href="#" data-letter="8">8</a>
            <a href="#" data-letter="9">9</a>
            <a href="#" data-letter="A">A</a>
            <a href="#" data-letter="B">B</a>
            <a href="#" data-letter="C">C</a>
            <a href="#" data-letter="Z">Z</a>
            <a href="#" data-letter="*">*</a>
        </div>
    </div>
</main>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
<script src="search.js"></script>
<script src="index.js"></script>

</body>
</html>
