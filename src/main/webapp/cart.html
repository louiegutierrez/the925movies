<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/single-movie.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/nav-bar.css">
    <link rel="stylesheet" href="styles/cart.css">

    <title>Movie</title>
</head>
<body>
<header>
    <nav class="navbar">
        <ul>
            <li><a href="browse.html" class="active">Browse</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="login.html" id="logout"> Logout </a></li>
        </ul>
        <form id="searchForm" action="movie-list.html" method="GET">
            <input type="text" name="title" id="autocomplete"
                   class="autocomplete-searchbox form-control"
                   placeholder="Title"/>
            <input type="number" name="year" placeholder="Year">
            <input type="text" name="director" placeholder="Director">
            <input type="text" name="star" placeholder="Star's Name">
            <button type="submit">Search</button>
        </form>
    </nav>

</header>
<h1> Cart </h1>
<div id="cart" >
    <h2 id="sessionID"> </h2>
    <h2 id="lastAccessTime"> </h2>
    <table id="cart-movies" class="table table-striped">
        <thead>
        <tr>
            <th>Title</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Add/Remove</th>
        </tr>
        </thead>
        <tbody id="cart_table_body"></tbody>
    </table>
    <h2 id="cartTotal"> </h2>
</div>

<a id="checkout" href="checkout.html" class="btn btn-primary"> Checkout </a>
<a id="back" href="movie-list.html">Back to Movie List</a>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.devbridge-autocomplete/1.4.11/jquery.autocomplete.min.js"></script>
<script src="logout.js"></script>
<script src="cart.js"></script>
<script src="search.js"></script>

</body>
</html>
